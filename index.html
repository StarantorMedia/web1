<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Starantor — Video- & Content-Produktion Schweiz</title>
  <meta name="description" content="Starantor produziert Werbevideos, Imagefilme und Social-Media-Content, der hängen bleibt. Videoproduktion aus der Schweiz."/>
  <meta property="og:title" content="Starantor — Video- & Content-Produktion"/>
  <meta property="og:description" content="Content, den man nicht wegscrollt. Videoproduktion und Social Media aus der Schweiz."/>
  <meta property="og:type" content="website"/>
  <meta name="referrer" content="strict-origin-when-cross-origin"/>
  <link rel="icon" type="image/png" href="assets/logo-web.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Palette — cinema dark, brand electric blue */
      --bg: #0B0C0F;
      --bg-raise: #111319;
      --bg-card: #14171E;
      --line: rgba(240,243,250,0.09);
      --line-strong: rgba(240,243,250,0.18);
      --text: #F2F3F6;
      --text-muted: rgba(233,237,246,0.62);
      --text-faint: rgba(233,237,246,0.38);
      --blue: #3D5BFF;
      --blue-deep: #2440C8;
      --blue-glow: rgba(61,91,255,0.45);
      --radius: 12px;
      --radius-sm: 8px;
      --container: 1240px;
      --nav-h: 76px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: "Inter", -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; overflow-x: hidden; }
    body { font-size: 16px; line-height: 1.6; }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; }
    img, video { display: block; max-width: 100%; }
    ::selection { background: var(--blue); color: #fff; }

    .container { max-width: var(--container); margin: 0 auto; padding: 0 32px; }
    @media (max-width: 640px) { .container { padding: 0 20px; } }

    /* Type system: Anton display / Inter body / Inter tracked utility */
    h1, h2, h3 { font-family: "Anton", "Inter", sans-serif; font-weight: 400; text-transform: uppercase; margin: 0; line-height: 0.96; letter-spacing: 0.005em; color: var(--text); }
    .display-xl { font-size: clamp(56px, 9.5vw, 132px); }
    .display-lg { font-size: clamp(40px, 5.6vw, 72px); }
    .display-md { font-size: clamp(30px, 3.6vw, 46px); }
    .accent { color: var(--blue); }
    .outline { color: transparent; -webkit-text-stroke: 1.5px rgba(242,243,246,0.85); }
    .eyebrow { font-size: 11.5px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-muted); font-weight: 600; font-variant-numeric: tabular-nums; }
    .tc { font-variant-numeric: tabular-nums; letter-spacing: 0.14em; font-size: 11px; font-weight: 500; color: var(--text-faint); text-transform: uppercase; }
    .muted { color: var(--text-muted); }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 10px; height: 50px; padding: 0 26px; border-radius: 999px; font-size: 15px; font-weight: 600; border: 1px solid transparent; transition: background 200ms ease, color 200ms ease, border-color 200ms ease, transform 220ms cubic-bezier(.3,.7,.3,1), box-shadow 220ms ease; white-space: nowrap; }
    .btn:active { transform: translateY(1px); }
    .btn .arr { transition: transform 220ms cubic-bezier(.3,.7,.3,1); }
    .btn:hover .arr { transform: translateX(4px); }
    .btn-fill { background: var(--text); color: #0B0C0F; }
    .btn-fill:hover { background: var(--blue); color: #fff; box-shadow: 0 12px 36px -14px var(--blue-glow); transform: translateY(-1px); }
    .btn-blue { background: var(--blue); color: #fff; }
    .btn-blue:hover { background: var(--blue-deep); transform: translateY(-1px); box-shadow: 0 12px 36px -14px var(--blue-glow); }
    .btn-ghost { background: transparent; color: var(--text); border-color: var(--line-strong); }
    .btn-ghost:hover { border-color: var(--text); background: rgba(255,255,255,0.05); }
    .btn-sm { height: 40px; padding: 0 18px; font-size: 13.5px; }

    section { padding: 140px 0; border-top: 1px solid var(--line); position: relative; }
    @media (max-width: 900px) { section { padding: 96px 0; } }
    @media (max-width: 640px) { section { padding: 72px 0; } }

    .section-head { max-width: 760px; margin-bottom: 64px; }
    .section-head .eyebrow { margin-bottom: 18px; display: flex; align-items: center; gap: 10px; }
    .section-head p { color: var(--text-muted); font-size: 18px; margin: 18px 0 0; max-width: 580px; }
    @media (max-width: 640px) { .section-head { margin-bottom: 44px; } .section-head p { font-size: 16px; } }

    /* Signature: viewfinder frame corners */
    .vf { position: relative; }
    .vf .vf-c { position: absolute; width: 18px; height: 18px; border: 0 solid rgba(255,255,255,0.55); transition: border-color 240ms ease, transform 240ms cubic-bezier(.3,.7,.3,1); pointer-events: none; z-index: 3; }
    .vf .vf-tl { top: 12px; left: 12px; border-top-width: 2px; border-left-width: 2px; }
    .vf .vf-tr { top: 12px; right: 12px; border-top-width: 2px; border-right-width: 2px; }
    .vf .vf-bl { bottom: 12px; left: 12px; border-bottom-width: 2px; border-left-width: 2px; }
    .vf .vf-br { bottom: 12px; right: 12px; border-bottom-width: 2px; border-right-width: 2px; }
    .vf:hover .vf-c { border-color: var(--blue); }
    .vf:hover .vf-tl { transform: translate(-3px,-3px); }
    .vf:hover .vf-tr { transform: translate(3px,-3px); }
    .vf:hover .vf-bl { transform: translate(-3px,3px); }
    .vf:hover .vf-br { transform: translate(3px,3px); }

    .rec-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--blue); box-shadow: 0 0 14px var(--blue-glow); animation: pulse 1.8s ease-in-out infinite; flex-shrink: 0; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }

    /* Marquee */
    .ticker { overflow: hidden; position: relative; }
    .ticker::before, .ticker::after { content: ""; position: absolute; top: 0; bottom: 0; width: 90px; z-index: 2; pointer-events: none; }
    .ticker::before { left: 0; background: linear-gradient(to right, var(--bg), transparent); }
    .ticker::after { right: 0; background: linear-gradient(to left, var(--bg), transparent); }
    .ticker-track { display: flex; gap: 80px; animation: scroll 38s linear infinite; width: max-content; align-items: center; }
    @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    /* Forms */
    input, textarea { font-family: inherit; font-size: 15px; color: var(--text); background: rgba(255,255,255,0.04); border: 1px solid var(--line-strong); border-radius: var(--radius-sm); padding: 13px 15px; width: 100%; outline: none; transition: border-color 180ms ease, background 180ms ease; }
    input::placeholder, textarea::placeholder { color: var(--text-faint); }
    input:focus, textarea:focus { border-color: var(--blue); background: rgba(255,255,255,0.06); }
    label { display: block; }

    body.menu-open, body.case-open { overflow: hidden; }
    /* Page recedes behind the case overlay */
    body.case-open #root { filter: blur(16px) brightness(0.5); transform: scale(0.985); }
    #root { transition: filter 420ms ease, transform 420ms ease; }

    :focus-visible { outline: 2px solid var(--blue); outline-offset: 3px; border-radius: 4px; }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <div id="overlay-root"></div>
  <script src="i18n.js?v=20"></script>
  <script type="text/babel" src="app.jsx?v=20"></script>
</body>
</html>
